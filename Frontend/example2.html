<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTMX Chat UI</title>

<script src="https://unpkg.com/htmx.org@1.9.10"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: #202123;
    color: white;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.sidebar h2 {
    font-size: 16px;
    margin-bottom: 10px;
}

.sidebar button {
    background: #343541;
    border: none;
    color: white;
    padding: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    border-radius: 6px;
}

.conversations {
    flex: 1;
    overflow-y: auto;
}

/* Main Chat */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #343541;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* Messages */
.message {
    margin-bottom: 15px;
    max-width: 700px;
}

.user {
    align-self: flex-end;
    background: #0b93f6;
    color: white;
    padding: 10px;
    border-radius: 10px;
}

.bot {
    background: #444654;
    color: white;
    padding: 10px;
    border-radius: 10px;
}

/* Input */
.input-area {
    padding: 15px;
    background: #40414f;
    display: flex;
}

.input-area input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: none;
}

.input-area button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    background: #19c37d;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <button 
        hx-get="/new-chat"
        hx-target="#chat-box"
        hx-swap="innerHTML">
        + New Chat
    </button>

    <div class="conversations"
         hx-get="/conversations"
         hx-trigger="load"
         hx-target="this">
        <!-- Loaded conversations -->
    </div>
</div>

<!-- Main Chat -->
<div class="main">

    <!-- Messages -->
    <div id="chat-box" class="chat-box">
        <!-- Messages will appear here -->
    </div>

    <!-- Input -->
    <form 
        class="input-area"
        hx-post="/chat"
        hx-target="#chat-box"
        hx-swap="beforeend"
        hx-on="htmx:afterRequest: this.reset()"
    >
        <input 
            type="text" 
            name="message" 
            placeholder="Send a message..." 
            autocomplete="off"
            required
        >
        <button type="submit">Send</button>
    </form>

</div>

</body>
</html>
